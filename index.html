<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hospital Patient Feedback</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', sans-serif;
      background: #f0f4f9;
      min-height: 100vh;
      padding: 32px 16px 64px;
      color: #202124;
    }

    .form-wrapper { max-width: 640px; margin: 0 auto; }

    .form-header {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.12);
      margin-bottom: 12px;
      border-top: 10px solid #7c4dff;
      padding: 24px;
    }

    .form-title { font-size: 32px; margin-bottom: 8px; }
    .form-subtitle { font-size: 14px; color: #5f6368; }

    .card {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 1px 3px rgba(0,0,0,.12);
      margin-bottom: 12px;
    }

    .question-label { margin-bottom: 12px; display: block; }

    .gf-input, .gf-textarea {
      width: 100%;
      border: none;
      border-bottom: 1px solid #dadce0;
      padding: 8px 0;
      outline: none;
    }

    .rating-options { display: flex; gap: 8px; }
    .radio-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #dadce0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    input[type="radio"] { display: none; }

    input[type="radio"]:checked + .radio-btn {
      background: #7c4dff;
      color: white;
      border-color: #7c4dff;
    }

    .btn-record {
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      color: white;
      margin-right: 10px;
    }

    .btn-start { background: #7c4dff; }
    .btn-stop { background: red; display: none; }

    .audio-player-wrap { display: none; margin-top: 10px; }

    .transcript-box { display: none; margin-top: 10px; }

    .btn-submit {
      padding: 12px 28px;
      background: #7c4dff;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="form-wrapper" id="formWrapper">

  <div class="form-header">
    <h1 class="form-title">🏥 Patient Feedback Form</h1>
    <p class="form-subtitle">We value your feedback.</p>
  </div>

  <div class="card">
    <input class="gf-input" id="patientId" placeholder="Patient ID"/>
  </div>

  <div class="card">
    <input class="gf-input" id="patientName" placeholder="Full Name"/>
  </div>

  <div class="card">
    <div class="rating-options">
      <label><input type="radio" name="q1" value="1"><span class="radio-btn">1</span></label>
      <label><input type="radio" name="q1" value="2"><span class="radio-btn">2</span></label>
      <label><input type="radio" name="q1" value="3"><span class="radio-btn">3</span></label>
      <label><input type="radio" name="q1" value="4"><span class="radio-btn">4</span></label>
      <label><input type="radio" name="q1" value="5"><span class="radio-btn">5</span></label>
    </div>
  </div>

  <div class="card">
    <textarea class="gf-textarea" id="improvement"></textarea>
  </div>

  <div class="card">
    <button class="btn-record btn-start" id="btnStart">Start</button>
    <button class="btn-record btn-stop" id="btnStop">Stop</button>

    <div class="audio-player-wrap" id="audioWrap">
      <audio id="audioPlayer" controls></audio>
    </div>

    <div class="transcript-box" id="transcriptBox">
      <p><b>Original:</b> <span id="originalText"></span></p>
      <p><b>Translation:</b> <span id="translatedText"></span></p>
    </div>
  </div>

  <button class="btn-submit" id="submitBtn">Submit</button>

</div>

<script>
const BACKEND = "https://hospitalfeedback-production.up.railway.app";

let mediaRecorder, chunks = [];
let original = "", translated = "", filename = "";

document.getElementById("btnStart").onclick = async () => {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  mediaRecorder = new MediaRecorder(stream);
  chunks = [];

  mediaRecorder.ondataavailable = e => chunks.push(e.data);

  mediaRecorder.onstop = async () => {
    const blob = new Blob(chunks);

    document.getElementById("audioWrap").style.display = "block";
    document.getElementById("audioPlayer").src = URL.createObjectURL(blob);

    const fd = new FormData();
    fd.append("file", blob, "recording.webm");

    const res = await fetch(`${BACKEND}/upload`, { method: "POST", body: fd });
    const data = await res.json();

    original = data.original_text;
    translated = data.uk_translation;
    filename = data.filename;

    document.getElementById("transcriptBox").style.display = "block";
    document.getElementById("originalText").innerText = original;
    document.getElementById("translatedText").innerText = translated;
  };

  mediaRecorder.start();
  btnStart.style.display = "none";
  btnStop.style.display = "inline";
};

document.getElementById("btnStop").onclick = () => {
  mediaRecorder.stop();
  btnStop.style.display = "none";
  btnStart.style.display = "inline";
};

document.getElementById("submitBtn").onclick = async () => {
  await fetch(`${BACKEND}/submit`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      patient_id: document.getElementById("patientId").value,
      name: document.getElementById("patientName").value,
      q1_rating: document.querySelector('input[name="q1"]:checked')?.value,
      q2_recommendation: "",
      q3_improvement: document.getElementById("improvement").value,
      original_text: original,
      uk_translation: translated,
      audio_filename: filename
    })
  });

  alert("Submitted!");
};
</script>

</body>
</html>
