<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hospital Feedback</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input, textarea, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
    }

    button {
      background: #6c5ce7;
      color: white;
      border: none;
      cursor: pointer;
    }

    .success {
      color: green;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Hospital Feedback Form</h2>

  <input id="patient_id" placeholder="Patient ID">
  <input id="name" placeholder="Name">

  <input id="q1" placeholder="Rating (1-5)">
  <input id="q2" placeholder="Recommend? Yes/No">
  <textarea id="q3" placeholder="Suggestions"></textarea>

  <h3>Voice Feedback</h3>
  <button onclick="startRecording()">Start Recording</button>
  <button onclick="stopRecording()">Stop Recording</button>

  <p id="status"></p>

  <button onclick="submitForm()">Submit</button>

  <p class="success" id="msg"></p>
</div>

<script>
const BACKEND = "https://hospitalfeedback-production.up.railway.app";// 🔥 yaha apna link daalo

let mediaRecorder;
let audioBlob;
let uploadedFileName = "";
let originalText = "";
let translatedText = "";

async function startRecording() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  mediaRecorder = new MediaRecorder(stream);

  let chunks = [];

  mediaRecorder.ondataavailable = e => chunks.push(e.data);

  mediaRecorder.onstop = async () => {
    audioBlob = new Blob(chunks, { type: 'audio/webm' });

    document.getElementById("status").innerText = "Uploading...";

    const formData = new FormData();
    formData.append("file", audioBlob, "recording.webm");

    const res = await fetch(`${BACKEND}/upload`, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    uploadedFileName = data.filename;
    originalText = data.original_text;
    translatedText = data.uk_translation;

    document.getElementById("status").innerText =
      "Translated: " + translatedText;
  };

  mediaRecorder.start();
}

function stopRecording() {
  mediaRecorder.stop();
}

async function submitForm() {
  const payload = {
    patient_id: document.getElementById("patient_id").value,
    name: document.getElementById("name").value,
    q1_rating: document.getElementById("q1").value,
    q2_recommendation: document.getElementById("q2").value,
    q3_improvement: document.getElementById("q3").value,
    original_text: originalText,
    uk_translation: translatedText,
    audio_filename: uploadedFileName
  };

  const res = await fetch(`${BACKEND}/submit`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if (data.status === "success") {
    document.getElementById("msg").innerText = "✅ Submitted successfully!";
  }
}
</script>

</body>
</html>
