<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hospital Patient Feedback</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', sans-serif;
      background: #f0f4f9;
      padding: 32px 16px;
      color: #202124;
    }

    .form-wrapper { max-width: 640px; margin: 0 auto; }

    .form-header {
      background: #fff;
      border-radius: 8px;
      border-top: 10px solid #7c4dff;
      padding: 24px;
      margin-bottom: 12px;
    }

    .form-title { font-size: 28px; margin-bottom: 8px; }
    .form-subtitle { font-size: 14px; color: #5f6368; }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .question-label { margin-bottom: 10px; display: block; }

    input, textarea {
      width: 100%;
      border: none;
      border-bottom: 1px solid #ccc;
      padding: 8px 0;
      outline: none;
    }

    .rating-options {
      display: flex;
      gap: 10px;
    }

    .radio-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    input[type="radio"] { display: none; }

    input[type="radio"]:checked + .radio-btn {
      background: #7c4dff;
      color: #fff;
      border-color: #7c4dff;
    }

    .btn {
      padding: 10px 20px;
      background: #7c4dff;
      color: white;
      border: none;
      margin-top: 10px;
      cursor: pointer;
    }

    .audio-player-wrap { margin-top: 10px; }
    .transcript-box { margin-top: 15px; }

    .error-msg { color: red; font-size: 12px; }
  </style>
</head>

<body>

<div class="form-wrapper">

  <div class="form-header">
    <h1 class="form-title">🏥 Patient Feedback Form</h1>
    <p class="form-subtitle">We value your feedback</p>
  </div>

  <div class="card">
    <input id="patientId" placeholder="Patient ID">
  </div>

  <div class="card">
    <input id="patientName" placeholder="Full Name">
  </div>

  <div class="card">
    <p>Q1 Rating</p>
    <div class="rating-options">
      <label><input type="radio" name="q1" value="1"><span class="radio-btn">1</span></label>
      <label><input type="radio" name="q1" value="2"><span class="radio-btn">2</span></label>
      <label><input type="radio" name="q1" value="3"><span class="radio-btn">3</span></label>
      <label><input type="radio" name="q1" value="4"><span class="radio-btn">4</span></label>
      <label><input type="radio" name="q1" value="5"><span class="radio-btn">5</span></label>
    </div>
  </div>

  <div class="card">
    <p>Q2 Recommend?</p>
    <div class="rating-options">
      <label><input type="radio" name="q2" value="1"><span class="radio-btn">1</span></label>
      <label><input type="radio" name="q2" value="2"><span class="radio-btn">2</span></label>
      <label><input type="radio" name="q2" value="3"><span class="radio-btn">3</span></label>
      <label><input type="radio" name="q2" value="4"><span class="radio-btn">4</span></label>
      <label><input type="radio" name="q2" value="5"><span class="radio-btn">5</span></label>
    </div>
  </div>

  <div class="card">
    <textarea id="improvement" placeholder="Suggestions"></textarea>
  </div>

  <div class="card">
    <button class="btn" onclick="startRecording()">Start Recording</button>
    <button class="btn" onclick="stopRecording()">Stop Recording</button>

    <div class="audio-player-wrap">
      <audio id="audioPlayer" controls></audio>
    </div>

    <div class="transcript-box">
      <p><b>Original:</b> <span id="originalText"></span></p>
      <p><b>Translation:</b> <span id="translatedText"></span></p>
    </div>

    <p class="error-msg" id="errVoice"></p>
  </div>

  <button class="btn" onclick="submitForm()">Submit</button>

</div>

<script>
const BACKEND = "https://hospitalfeedback-production.up.railway.app";

let mediaRecorder, audioChunks = [], audioBlob;
let originalText = "", translatedText = "", filename = "";

async function startRecording() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  mediaRecorder = new MediaRecorder(stream);
  audioChunks = [];

  mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

  mediaRecorder.onstop = async () => {
    audioBlob = new Blob(audioChunks);
    document.getElementById("audioPlayer").src = URL.createObjectURL(audioBlob);

    const formData = new FormData();
    formData.append("file", audioBlob, "recording.webm");

    try {
      const res = await fetch(`${BACKEND}/upload`, { method: "POST", body: formData });
      const data = await res.json();

      originalText = data.original_text;
      translatedText = data.uk_translation;
      filename = data.filename;

      document.getElementById("originalText").innerText = originalText;
      document.getElementById("translatedText").innerText = translatedText;

    } catch (e) {
      document.getElementById("errVoice").innerText = "Upload failed";
    }
  };

  mediaRecorder.start();
}

function stopRecording() {
  mediaRecorder.stop();
}

async function submitForm() {
  const payload = {
    patient_id: document.getElementById("patientId").value,
    name: document.getElementById("patientName").value,
    q1_rating: document.querySelector('input[name="q1"]:checked')?.value,
    q2_recommendation: document.querySelector('input[name="q2"]:checked')?.value,
    q3_improvement: document.getElementById("improvement").value,
    original_text: originalText,
    uk_translation: translatedText,
    audio_filename: filename
  };

  await fetch(`${BACKEND}/submit`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  });

  alert("Submitted!");
}
</script>

</body>
</html>
